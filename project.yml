name: SnoreLess
options:
  bundleIdPrefix: com.nicenoodle
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  defaultConfig: Release
  knownRegions:
    - ko
    - en
    - ja

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "52GH89WGBV"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "3"
    SWIFT_EMIT_LOC_STRINGS: "YES"

targets:
  SnoreLess:
    type: application
    platform: iOS
    sources:
      - path: SnoreLess
        type: group
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicenoodle.snoreless
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "코골이 방지"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "수면 품질 분석을 위해 건강 데이터에 접근합니다."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "코골이 감지를 위해 마이크에 접근합니다."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "수면 중 코골이 데이터를 건강 앱에 기록합니다."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "수면 품질 분석을 위해 건강 데이터에 접근합니다."
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: SnoreLess/SnoreLess.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - health-records
        com.apple.security.application-groups:
          - group.com.nicenoodle.snoreless
    dependencies:
      - target: SnoreLessWatch
        embed: true
      - target: SnoreLessWidget
        embed: true

  SnoreLessTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SnoreLessTests
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicenoodle.snoreless.tests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SnoreLess

  SnoreLessWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - path: Tests/SnoreLessWatchTests
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicenoodle.snoreless.watchtests
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: SnoreLessWatch

  SnoreLessWatch:
    type: application
    platform: watchOS
    sources:
      - path: SnoreLessWatch
        type: group
        excludes:
          - "Complications/**"
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicenoodle.snoreless.watchkitapp
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: SnoreLessWatch/Info.plist
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.nicenoodle.snoreless
        INFOPLIST_KEY_CFBundleDisplayName: "코골이 방지"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "코골이 감지를 위해 마이크에 접근합니다."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "수면 품질 분석을 위해 건강 데이터에 접근합니다."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "수면 중 코골이 데이터를 건강 앱에 기록합니다."
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: false
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - framework: SoundAnalysis.framework
        embed: false
      - sdk: WidgetKit.framework
      - target: SnoreLessWatchWidgets
        embed: true
    entitlements:
      path: SnoreLessWatch/SnoreLessWatch.entitlements
      properties:
        com.apple.developer.healthkit: true

  SnoreLessWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SnoreLessWidget
        type: group
      - path: Shared
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicenoodle.snoreless.widget
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: SnoreLessWidget/Info.plist
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: SnoreLessWidget/SnoreLessWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.nicenoodle.snoreless
    dependencies: []

  SnoreLessWatchWidgets:
    type: app-extension
    platform: watchOS
    sources:
      - path: SnoreLessWatch/Complications
        type: group
      - path: Shared/StorageKeys.swift
        type: file
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicenoodle.snoreless.watchkitapp.widgets
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: SnoreLessWatch/Complications/Info.plist
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    dependencies: []
